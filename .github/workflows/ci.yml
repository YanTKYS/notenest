name: CI

on:
  push:
    branches:
      - 'claude/**'
      - 'claude*'
      - 'codex/**'
      - 'codex*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NestSuite.sln

      - name: Build
        run: dotnet build NestSuite.sln -c Release --no-restore

      - name: Test
        run: dotnet test NestSuite.Tests/NestSuite.Tests.csproj -c Release --no-build --no-restore

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_number }}
          path: NestSuite/bin/Release/
          retention-days: 1
