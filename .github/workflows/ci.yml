name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NoteNest/NoteNest.csproj

      - name: Build
        run: dotnet build NoteNest/NoteNest.csproj -c Release --no-restore

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_number }}
          path: NoteNest/bin/Release/
          retention-days: 7
